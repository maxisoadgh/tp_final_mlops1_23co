# ──────────────────────────────────────────────────────────────────────────────
# Stack TP — Aprendizaje de Máquina II
# Servicios: JupyterLab · MLflow · Airflow (CeleryExecutor) · MinIO
# ──────────────────────────────────────────────────────────────────────────────
version: "3.8"

x-airflow-common: &airflow-common
  build: './dockerfiles/airflow'
  image: ${AIRFLOW_IMAGE_NAME:-extending_airflow:latest}
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_PG_USER:-airflow}:${AIRFLOW_PG_PASSWORD:-airflow}@postgres:5432/${AIRFLOW_PG_DATABASE:-airflow}
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${AIRFLOW_PG_USER:-airflow}:${AIRFLOW_PG_PASSWORD:-airflow}@postgres:5432/${AIRFLOW_PG_DATABASE:-airflow}
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_PG_USER:-airflow}:${AIRFLOW_PG_PASSWORD:-airflow}@postgres:5432/${AIRFLOW_PG_DATABASE:-airflow}
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__API_AUTH__JWT_SECRET: '${AIRFLOW__API_AUTH__JWT_SECRET}'
    AIRFLOW__WEBSERVER__SECRET_KEY: '${AIRFLOW__API_AUTH__JWT_SECRET}'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'True'
    _PIP_ADDITIONAL_REQUIREMENTS: "boto3 pandas"
    AIRFLOW__SECRETS__BACKEND: 'airflow.secrets.local_filesystem.LocalFilesystemBackend' 
    AIRFLOW__SECRETS__BACKEND_KWARGS: '{"connections_file_path": "/opt/secrets/connections.yaml"}'
    AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minio}
    AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_ACCESS_KEY:-minio123}
    AWS_ENDPOINT_URL_S3: http://minio:9000
    MLFLOW_TRACKING_URI: http://mlflow-proxy:5001
    MLFLOW_S3_ENDPOINT_URL: http://minio:9000
  volumes:
    - ${AIRFLOW_PROJ_DIR:-./airflow}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-./airflow}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-./airflow}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-./airflow}/plugins:/opt/airflow/plugins
    - ./src:/opt/airflow/src
    - ./datasets:/opt/airflow/datasets
    - ./airflow/secrets:/opt/secrets
  networks:
    - backend
  user: "${AIRFLOW_UID:-50000}:${AIRFLOW_GID:-0}"
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  # ── Base de datos ────────────────────────────────────────────
  postgres:
    restart: always
    image: postgres:14.19-trixie
    container_name: postgres
    ports:
      - "${PG_PORT:-5432}:5432"
    networks:
      - backend
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${PG_PORT:-5432}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-p", "5432", "-U", "${PG_USER:-postgres}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  # ── Redis (broker Celery para Airflow) ───────────────────────
  redis:
    image: valkey/valkey:8.1-bookworm
    container_name: redis
    expose:
      - 6379
    networks:
      - backend
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always

  # ── MinIO ────────────────────────────────────────────────────
  minio:
    restart: always
    image: minio/minio:latest
    container_name: minio
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_PORT_UI:-9001}:9001"
    networks:
      - backend
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_ACCESS_KEY:-minio123}
    volumes:
      - minio_data:/data
    command: server /data --console-address :9001
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
  minio-init:
    image: minio/mc:latest
    container_name: minio_init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - backend
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_ACCESS_KEY:-minio123}
      BUCKET_MLFLOW: ${MLFLOW_BUCKET_NAME:-mlflow}
      BUCKET_DATA_LAKE: "data-lake"
    volumes:
      - ./datasets:/datasets
    entrypoint: >
     /bin/sh -c "
      until /usr/bin/mc alias set myminio http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\"; do
        echo 'Esperando a MinIO...';
        sleep 2;
      done;
      echo 'Creando buckets...';
      /usr/bin/mc mb --ignore-existing myminio/$$BUCKET_MLFLOW;
      /usr/bin/mc mb --ignore-existing myminio/$$BUCKET_DATA_LAKE;
      echo 'Cargando datasets...';
      if [ -d '/datasets/aerolineas' ]; then
          /usr/bin/mc cp -r /datasets/aerolineas myminio/$$BUCKET_DATA_LAKE/;
      else
          echo 'ERROR: Carpeta /datasets/aerolineas no encontrada';
      fi
      /usr/bin/mc anonymous set download myminio/$$BUCKET_DATA_LAKE;
      echo 'Provisioning finalizado con éxito.';
      exit 0;
      "
  # ── MLflow ───────────────────────────────────────────────────
  mlflow:
    restart: always
    build: './dockerfiles/mlflow'
    image: mlflow_server
    container_name: mlflow
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    networks:
      - backend
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minio}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_ACCESS_KEY:-minio123}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      MLFLOW_TESTING: "true"
    command: >
      mlflow server
      --backend-store-uri postgresql://${PG_USER:-postgres}:${PG_PASSWORD:-postgres}@postgres:5432/mlflow_db
      --host 0.0.0.0
      --default-artifact-root s3://${MLFLOW_BUCKET_NAME:-mlflow}/
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5000 || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # Proxy nginx: reescribe el Host header para evitar el DNS rebinding check de MLflow (daba error en jupyter)
  mlflow-proxy:
    image: nginx:alpine
    container_name: mlflow_proxy
    networks:
      - backend
    volumes:
      - ./nginx/mlflow.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      mlflow:
        condition: service_healthy
    restart: always

  # ── JupyterLab ───────────────────────────────────────────────
  jupyter:
    restart: always
    build: './dockerfiles/jupyter'
    image: jupyterlab_tp
    container_name: jupyterlab
    depends_on:
      mlflow:
        condition: service_healthy
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
    networks:
      - backend
    environment:
      MLFLOW_TRACKING_URI: http://mlflow-proxy:5001
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minio}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_ACCESS_KEY:-minio123}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      GIT_PYTHON_REFRESH: quiet
    volumes:
      - ./notebooks:/home/notebooks
      - ./datasets:/home/datasets
      - ./src:/home/src

  # ── FastAPI ──────────────────────────────────────────────────
  api:
    build:
      context: '.'
      dockerfile: './dockerfiles/api/Dockerfile'
    image: fastapi_tp
    container_name: fastapi
    ports:
      - "${API_PORT:-8000}:8000"
    networks:
      - backend
    environment:
      MLFLOW_TRACKING_URI: http://mlflow-proxy:5001
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minio}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_ACCESS_KEY:-minio123}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      GIT_PYTHON_REFRESH: quiet
    volumes:
      - ./api:/app
      - ./src:/app/src
    depends_on:
      mlflow:
        condition: service_healthy
    restart: always

  # ── Airflow ──────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        one_meg=1048576
        mem_available=$$(($$(getconf _PHYS_PAGES) * $$(getconf PAGE_SIZE) / one_meg))
        cpus_available=$$(grep -cE 'cpu[0-9]+' /proc/stat)
        disk_available=$$(df / | tail -1 | awk '{print $$4}')
        warning_resources="false"
        if (( mem_available < 4000 )) ; then
          echo -e "\033[1;33mWARNING: Not enough memory (need ≥4GB, have $$(numfmt --to iec $$((mem_available * one_meg))))\e[0m"
          warning_resources="true"
        fi
        if (( cpus_available < 2 )); then
          echo -e "\033[1;33mWARNING: Not enough CPUs (need ≥2, have $${cpus_available})\e[0m"
          warning_resources="true"
        fi
        echo "Creating Airflow directories..."
        mkdir -v -p /opt/airflow/{logs,dags,plugins,config}
        /entrypoint airflow version
        /entrypoint airflow config list >/dev/null
        chown -R "${AIRFLOW_UID:-50000}:${AIRFLOW_GID:-0}" /opt/airflow/
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: "boto3 pandas"
    user: "0:0"

  airflow-apiserver:
    <<: *airflow-common
    container_name: airflow_apiserver
    command: api-server
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    container_name: airflow_dag_processor
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    container_name: airflow_worker
    command: celery worker
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-apiserver:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      mlflow-proxy:
        condition: service_started

  airflow-triggerer:
    <<: *airflow-common
    container_name: airflow_triggerer
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

networks:
  backend:
    driver: bridge

volumes:
  db_data:
  minio_data: