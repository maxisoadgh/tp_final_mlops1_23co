name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'mlops-docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install mkdocs-material mkdocs-mermaid2-plugin

      - name: Deploy
        run: |
          cd mlops-docs
          mkdocs gh-deploy --force
